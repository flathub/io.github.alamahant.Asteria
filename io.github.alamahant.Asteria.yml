app-id: io.github.alamahant.Asteria
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: Asteria
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents/Asteria:create
modules:
  - name: Asteria
    buildsystem: cmake-ninja
    config-opts:
      - -DFLATHUB_BUILD=ON
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/alamahant/Asteria.git
        tag: v2.4.6
        commit: 4c17fcb4bd77015a558b39cf9dbc9a623c2d0003
      - type: git
        url: https://github.com/aloistr/swisseph.git
        dest: swisseph_src
        commit: c353e6f813c825fcb7c4c005e4ebfdd2cf31c21b

    cleanup:
      - "/include"
      - "/lib/pkgconfig"
      - "/share/aclocal"
      - "/share/man"
      - "/share/doc"
      - "/share/gtk-doc"

      #- "*.a"
      - "*.la"
      - "*.h"

      - "list.zip"
      - "astlistn.md"
      - "/share/swisseph/sat"
      - "/share/swisseph/ep4"
















